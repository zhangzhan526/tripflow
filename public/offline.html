<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>TripFlow 离线模式</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1e293b;
        --muted: #64748b;
        --line: #e2e8f0;
        --accent: #0ea5e9;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at top right, #e0f2fe, var(--bg));
        color: var(--text);
      }
      .card {
        width: min(100%, 460px);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.15rem;
      }
      p {
        margin: 0 0 10px;
        line-height: 1.55;
        color: var(--muted);
      }
      .row {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button,
      a {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 14px;
        background: #fff;
        color: var(--text);
        text-decoration: none;
        cursor: pointer;
      }
      .accent {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>当前处于离线状态</h1>
      <p>你可以继续查看已缓存页面。网络恢复后，TripFlow 会自动同步最新内容。</p>
      <p>建议：先使用已生成行程或历史记录页进行演示。</p>
      <div class="row">
        <button class="accent" type="button" id="retryBtn">重试连接</button>
        <a href="/feed">返回发现页</a>
      </div>
    </main>
    <script>
      document.getElementById("retryBtn").addEventListener("click", () => {
        location.href = "/feed";
      });
    </script>
  </body>
</html>
